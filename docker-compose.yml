version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vidumurai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - vidumurai_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vidumurai_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/vidumurai
      - JWT_SECRET=supersecret123
      - JWT_EXPIRE=30d
    depends_on:
      - mongodb
    networks:
      - vidumurai_network

  client-react:
    build:
      context: ./client-react
      dockerfile: Dockerfile
    container_name: vidumurai_react
    ports:
      - "3000:80"
    networks:
      - vidumurai_network
    depends_on:
      - backend

  client-angular:
    build:
      context: ./client-angular
      dockerfile: Dockerfile
    container_name: vidumurai_angular
    ports:
      - "4200:80"
    networks:
      - vidumurai_network
    depends_on:
      - backend

networks:
  vidumurai_network:
    driver: bridge

volumes:
  mongo_data:
