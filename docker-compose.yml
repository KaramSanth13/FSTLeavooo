version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: leave_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - leave_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: leave_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/leave_management
      - JWT_SECRET=supersecret123
      - JWT_EXPIRE=30d
    depends_on:
      - mongodb
    networks:
      - leave_network

  react-dashboard:
    build:
      context: ./client/react-dashboard
      dockerfile: Dockerfile
    container_name: leave_react_dashboard
    ports:
      - "3000:80"
    networks:
      - leave_network

  angular-portal:
    build:
      context: ./client/angular-portal
      dockerfile: Dockerfile
    container_name: leave_angular_portal
    ports:
      - "4200:80"
    networks:
      - leave_network

networks:
  leave_network:
    driver: bridge

volumes:
  mongo_data:
